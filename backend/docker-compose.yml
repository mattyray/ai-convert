version: "3.9"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8002:8000"  # Exposes port 8000 inside container as 8002 on host
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/code
    networks:
      - ai_convert_network

  db:
    image: postgres:16  # ✅ Optionally upgraded from 15
    container_name: ai_convert_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - ai_convert_network

volumes:
  postgres_data:

networks:
  ai_convert_network:
